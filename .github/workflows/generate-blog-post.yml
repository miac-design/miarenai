name: Generate Blog Post

on:
  schedule:
    # Runs every other Monday at 9am UTC (biweekly)
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "Specific topic for the blog post (optional - AI will choose if empty)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Generate blog post with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: node scripts/generate-blog-post.mjs "${{ github.event.inputs.topic || '' }}"

      - name: Check if files were generated
        id: check
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Validate blog post
        if: steps.check.outputs.changed == 'true'
        id: validate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: |
          if node scripts/validate-blog-post.mjs; then
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "approved=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-publish to main
        if: steps.check.outputs.changed == 'true' && steps.validate.outputs.approved == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/blog-data.ts lib/blog-content.ts
          git commit -m "Publish blog post $(date +%Y-%m-%d) [auto-generated]"
          git push origin main

      - name: Create PR for manual review (validation failed)
        if: steps.check.outputs.changed == 'true' && steps.validate.outputs.approved == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="blog/needs-review-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add lib/blog-data.ts lib/blog-content.ts
          git add validation-result.json || true
          git commit -m "Blog post needs review $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          VALIDATION=$(cat validation-result.json 2>/dev/null || echo '{}')
          gh pr create \
            --title "Blog Post Needs Review — $(date +%B\ %d,\ %Y)" \
            --body "$(cat <<EOF
          ## Blog Post Flagged for Review

          The automated validator found issues with this post. Please review before publishing.

          ### Validation Result
          \`\`\`json
          $VALIDATION
          \`\`\`

          **Action:** Fix issues and merge to publish, or close to discard.
          EOF
          )"
