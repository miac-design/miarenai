name: Generate Blog Post Draft

on:
  schedule:
    # Runs every other Monday at 9am UTC (biweekly)
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "Specific topic for the blog post (optional - AI will choose if empty)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blog post with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog-post.mjs "${{ github.event.inputs.topic || '' }}"

      - name: Check if files were generated
        id: check
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with draft post
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="blog/draft-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add lib/blog-data.ts lib/blog-content.ts
          git commit -m "Draft blog post generated $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Draft Blog Post — $(date +%B\ %d,\ %Y)" \
            --body "$(cat <<'EOF'
          ## Auto-Generated Blog Draft

          This post was generated by the scheduled blog pipeline using Claude.

          **Review checklist:**
          - [ ] Review title and description
          - [ ] Check content accuracy and tone
          - [ ] Verify statistics and citations
          - [ ] Ensure it matches Mia's voice
          - [ ] Approve and merge to publish

          > Merge this PR to publish. Close it to discard.
          EOF
          )" \
            --label "blog-draft"
